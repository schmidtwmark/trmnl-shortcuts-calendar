- keyname: title_lines
  field_type: number
  default: 1
  min: 1
  max: 3
  name: Title Lines
  description: How many maximum lines do you want titles to be displayed over?
- keyname: show_dates_and_times
  field_type: select
  options:
    - "Yes"
    - "No"
  default: "yes"
  name: Dates and Times
  description: Do you want dates/times shown for reminders?
- keyname: show_list_names
  field_type: select
  options:
    - "Yes"
    - "No"
  default: "no"
  name: List Names
  description: Do you want list names shown for reminders?
- keyname: date_format
  field_type: select
  options:
    - "31 Jan 2025"
    - "2025-01-31"
    - "31/01/2025"
    - "01/31/2025"
  default: 31_jan_2025
  name: Date Formatting
  description: How do you want dates to be formatted?
- keyname: date_day_name
  field_type: select
  options:
    - "Yes"
    - "No"
  default: "yes"
  name: Display Day Names?
  description: Do you want day names shown in front of dates?
- keyname: time_format
  field_type: select
  options:
    - "12 hours"
    - "24 hours (leading zeroes 08:45)"
    - "24 hours (no leading zeroes 8:45)"
  default: "12_hours"
  name: Time Formatting
  description: How do you want times to be formatted?
- keyname: right_label
  field_type: select
  options:
    - "Attribution"
    - "Your Name"
    - "Instance Name"
    - "Blank"
  default: blank
  name: Right Label
  description: What do you want shown on the right of the title bar?
