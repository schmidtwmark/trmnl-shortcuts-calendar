- keyname: apple_shortcut_url
  field_type: copyable
  name: Shortcut URL
  value: "https://www.icloud.com/shortcuts/YOUR_SHORTCUT_ID_HERE"
  description: |-
    Import this shortcut on your iPhone or iPad.
    Set up automations to trigger it periodically (e.g., every hour or when Calendar app closes).
    You will need to know the UUID of this plugin instance while importing.
    The shortcut will fetch events from all your calendars and send them to TRMNL.
- keyname: title_lines
  field_type: number
  default: 1
  min: 1
  max: 3
  name: Title Lines
  description: How many maximum lines do you want event titles to be displayed over?
- keyname: show_times
  field_type: select
  options:
    - "Yes"
    - "No"
  default: "yes"
  name: Show Times
  description: Do you want start/end times shown for events?
- keyname: show_calendar_names
  field_type: select
  options:
    - "Yes"
    - "No"
  default: "yes"
  name: Calendar Names
  description: Do you want calendar names shown for events?
- keyname: show_location
  field_type: select
  options:
    - "Yes"
    - "No"
  default: "yes"
  name: Location
  description: Do you want locations shown for events (when available)?
- keyname: show_notes
  field_type: select
  options:
    - "Yes"
    - "No"
  default: "no"
  name: Notes
  description: Do you want notes/descriptions shown for events?
- keyname: note_lines
  field_type: number
  default: 1
  min: 1
  max: 3
  name: Note Lines
  description: How many maximum lines do you want notes to be displayed over (will have no effect if notes are not shown)?
- keyname: date_format
  field_type: select
  options:
    - "31 Jan 2025"
    - "2025-01-31"
    - "31/01/2025"
    - "01/31/2025"
  default: 31_jan_2025
  name: Date Formatting
  description: How do you want dates to be formatted?
- keyname: date_day_name
  field_type: select
  options:
    - "Yes"
    - "No"
  default: "yes"
  name: Display Day Names?
  description: Do you want day names shown in front of dates?
- keyname: time_format
  field_type: select
  options:
    - "12 hours"
    - "24 hours (leading zeroes 08:45)"
    - "24 hours (no leading zeroes 8:45)"
  default: "24_hours_(leading_zeroes_08:45)"
  name: Time Formatting
  description: How do you want times to be formatted?
- keyname: right_label
  field_type: select
  options:
    - "Attribution"
    - "Your Name"
    - "Blank"
  default: attribution
  name: Right Label
  description: What do you want shown on the right of the title bar?
